# Cron — Paddock Challenges Content Top-up
#
# Weekly generator run for both content-driven Challenges competitions (Rumor or Not, Trivia).
# Draws from the same paddock-rumors knowledge base as paddock-rumors.yml, via Claude, and
# imports results as drafts (status='draft') on the target environment — never auto-published;
# an admin still reviews and publishes them on admin-challenges.php. Scheduled a few days ahead
# of the existing Monday Perfect-Week cron (cron-challenges.yml) so there's a fresh batch ready
# to review over the weekend before the new week's content is needed.
#
# bin/generate-rumor-items.js and bin/generate-trivia-questions.js are local/CI-only (NFR-101 on
# the rumor generator; same reasoning applies to trivia) — they call the Anthropic API directly
# and must never run on shared hosting, unlike the PHP cron endpoints the other cron-*.yml
# workflows hit. No config.*.php is checked out here, so SITE_URL/INTEGRATION_SEED_TOKEN are
# passed as env vars (repo Variables/Secrets) instead — both scripts already prefer these over
# reading a local config file when set.
#
# The scheduled run always targets test, both generators — matches the deploy:live convention
# of requiring an explicit directive for anything touching production (this writes drafts
# unattended, on a timer, with real API spend; nothing here is player-visible until an admin
# publishes it, but that's not the same as it being fine to run against live with no human in
# the loop). A live batch is a deliberate workflow_dispatch run with environment=live. Also use
# workflow_dispatch to re-run just one generator (e.g. after the other already succeeded).
#
# Rumors and Trivia run as separate parallel jobs, each committing its own KB-usage state
# right after its own generator succeeds — a large batch (~95 items) takes ~12-15 minutes of
# sequential Claude calls each, which doesn't fit both in one job's budget back-to-back, and a
# single shared "commit at the very end" step meant one generator failing/timing out discarded
# the other's already-successful state update too (surfaced by the first real full-KB run).

name: Cron — Content Top-up

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: false
        default: 'test'
        type: choice
        options: ['test', 'live']
      count:
        description: 'Items to generate per competition'
        required: false
        default: '6'
      target:
        description: 'Which generator(s) to run'
        required: false
        default: 'both'
        type: choice
        options: ['both', 'rumors', 'trivia']
  schedule:
    - cron: '0 6 * * 5' # Friday 06:00 UTC

permissions:
  contents: write

jobs:
  resolve:
    runs-on: ubuntu-latest
    outputs:
      env: ${{ steps.target.outputs.env }}
      count: ${{ steps.target.outputs.count }}
      target: ${{ steps.target.outputs.target }}
    steps:
      - id: target
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "env=${{ github.event.inputs.environment }}" >> "$GITHUB_OUTPUT"
            echo "target=${{ github.event.inputs.target || 'both' }}" >> "$GITHUB_OUTPUT"
          else
            echo "env=test" >> "$GITHUB_OUTPUT"
            echo "target=both" >> "$GITHUB_OUTPUT"
          fi
          echo "count=${{ github.event.inputs.count || '6' }}" >> "$GITHUB_OUTPUT"

  rumors:
    needs: resolve
    if: needs.resolve.outputs.target == 'both' || needs.resolve.outputs.target == 'rumors'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Generate rumor drafts
        env:
          SITE_URL: ${{ needs.resolve.outputs.env == 'live' && vars.BASE_URL_LIVE || vars.BASE_URL_TEST }}
          INTEGRATION_SEED_TOKEN: ${{ needs.resolve.outputs.env == 'live' && secrets.INTEGRATION_SEED_TOKEN || secrets.INTEGRATION_SEED_TOKEN_TEST }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node bin/generate-rumor-items.js --env=${{ needs.resolve.outputs.env }} --count=${{ needs.resolve.outputs.count }}

      # KB usage state (bin/state/rumor-generator-state.json) tracks which docs have already
      # been drawn for a real-fact card, shared across scheduled runs — committed here (not in
      # a later shared step) so this job's progress is saved even if the trivia job fails.
      - name: Commit rumor KB usage state if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add bin/state/rumor-generator-state.json 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "no state changes — nothing to commit"
          else
            git commit -m "content-topup: rumor KB usage state ($(date -u +%Y-%m-%d))"
            git pull --rebase && git push
          fi

  trivia:
    needs: resolve
    if: needs.resolve.outputs.target == 'both' || needs.resolve.outputs.target == 'trivia'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Generate trivia drafts
        env:
          SITE_URL: ${{ needs.resolve.outputs.env == 'live' && vars.BASE_URL_LIVE || vars.BASE_URL_TEST }}
          INTEGRATION_SEED_TOKEN: ${{ needs.resolve.outputs.env == 'live' && secrets.INTEGRATION_SEED_TOKEN || secrets.INTEGRATION_SEED_TOKEN_TEST }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node bin/generate-trivia-questions.js --env=${{ needs.resolve.outputs.env }} --count=${{ needs.resolve.outputs.count }}

      # Same reasoning as the rumors job's state-commit step above — kept independent so
      # this job's progress isn't lost if the rumors job fails/times out, and vice versa.
      - name: Commit trivia KB usage state if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add bin/state/trivia-generator-state.json 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "no state changes — nothing to commit"
          else
            git commit -m "content-topup: trivia KB usage state ($(date -u +%Y-%m-%d))"
            git pull --rebase && git push
          fi
