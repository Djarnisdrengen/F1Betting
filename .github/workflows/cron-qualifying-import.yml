name: Cron — Qualifying Results Import

# Replaces the Simply.com control-panel cron entry for import_qualifying.php as part
# of F6 (security-findings-remaining.md): Simply's control-panel cron only does a
# plain GET with no custom headers, so it can't carry the new Authorization: Bearer
# token. Cut over 2026-07-09 — the Simply.com control-panel entry for this script was
# deleted in the same sitting this schedule was enabled. Remove the ?token= shim from
# import_qualifying.php after one clean qualifying weekend of scheduled runs.
#
# GitHub's schedule: is UTC-only with no DST awareness, so this spreads across the
# plausible local-time range for Saturday qualifying rather than pin one offset that
# would silently drift an hour each spring/autumn. The extra firings are harmless
# no-ops: the script only writes when a race's quali_p1 is still NULL, and it
# self-gates to 06:00-23:59 local time.
#
# dry_run=true is TEST-ENV ONLY — tools/f1_testdata.php (the stub data it loads) is
# excluded from the live deploy (.deployignore.live), so dry_run against live dies on
# a fatal require() partway through (truncated HTTP 200 — headers already flushed by
# the time the fatal hits). Not an F6 issue; a pre-existing gap, tracked separately.
on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (?test=true) — TEST ENV ONLY, see comment above"
        required: false
        default: "false"
  schedule:
    - cron: '0 13,14,15,16,17 * * 6'

jobs:
  trigger:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Trigger qualifying import cron
        env:
          BASE_URL_LIVE: ${{ vars.BASE_URL_LIVE }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          DRY_RUN: ${{ github.event.inputs.dry_run }}
        run: |
          node -e "
            const url = process.env.BASE_URL_LIVE + '/cron/import_qualifying.php' + (process.env.DRY_RUN === 'true' ? '?test=true' : '');
            fetch(url, { headers: { Authorization: 'Bearer ' + process.env.CRON_SECRET } })
              .then(async r => {
                const text = await r.text();
                console.log(text);
                if (!r.ok || !text.includes('Total races updated')) {
                  console.error('Unexpected response (HTTP ' + r.status + ')');
                  process.exit(1);
                }
              })
              .catch(e => { console.error(e); process.exit(1); });
          "
