name: Monthly Security Review

on:
  schedule:
    - cron: '17 8 1 * *'  # 1st of each month at 08:17 UTC
  workflow_dispatch:        # allow manual trigger from GitHub UI

jobs:
  security-review:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run monthly security review
        env:
          SMTP_HOST: ${{ vars.SMTP_HOST }}
          SMTP_PORT: ${{ vars.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          SMTP_FROM: ${{ vars.SMTP_FROM }}
          REPORT_TO: ${{ vars.REPORT_TO }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: node build-deploy/security-review.js

      - name: Upload review report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-review-${{ github.run_id }}
          path: build-deploy/security-reports/*security-review.html
          retention-days: 90
