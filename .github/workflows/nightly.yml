name: Nightly Tests & Security Scan

on:
  schedule:
    - cron: '0 1 * * *'  # 01:00 UTC = 02:00 CET (winter) / 03:00 CEST (summer)
  workflow_dispatch:       # allow manual trigger from GitHub UI

jobs:
  nightly:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright (Chromium)
        run: npx playwright install chromium --with-deps

      - name: Run nightly report
        env:
          # Site
          DEPLOY_ENV: live
          BASE_URL_LIVE: ${{ vars.BASE_URL_LIVE }}

          # Test credentials (repo Secrets)
          TEST_USER_EMAIL_LIVE: f1_admin@helvegpovlsen.dk
          TEST_USER_PASSWORD_LIVE: ${{ secrets.TEST_USER_PASSWORD_LIVE }}
          # Optional: non-admin account for privilege-escalation check
          TEST_REGULAR_USER_EMAIL_LIVE: ${{ secrets.TEST_REGULAR_USER_EMAIL_LIVE }}
          TEST_REGULAR_USER_PASSWORD_LIVE: ${{ secrets.TEST_REGULAR_USER_PASSWORD_LIVE }}

          # SMTP — non-sensitive config as repo Variables, credentials as repo Secrets
          SMTP_HOST: ${{ vars.SMTP_HOST }}
          SMTP_PORT: ${{ vars.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          SMTP_FROM: ${{ vars.SMTP_FROM }}
          REPORT_TO: ${{ vars.REPORT_TO }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}

        run: node build-deploy/nightly-report.js

      - name: Upload nightly report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-report-${{ github.run_id }}
          path: build-deploy/nightly-reports/
          retention-days: 30

  backup-db:
    runs-on: ubuntu-latest
    needs: nightly
    if: always()

    steps:
      - name: Download live DB backup
        env:
          BASE_URL_LIVE: ${{ vars.BASE_URL_LIVE }}
          INTEGRATION_SEED_TOKEN: ${{ secrets.INTEGRATION_SEED_TOKEN }}
        run: |
          curl -sf \
            "${BASE_URL_LIVE}/tools/db-backup.php?token=${INTEGRATION_SEED_TOKEN}" \
            -o db-backup.json
          node -e "const d=JSON.parse(require('fs').readFileSync('db-backup.json','utf8')); if(!d.ok){console.error(d);process.exit(1);}"

      - name: Upload DB backup artifact
        uses: actions/upload-artifact@v4
        with:
          name: db-backup-${{ github.run_id }}-${{ github.run_number }}
          path: db-backup.json
          retention-days: 90
